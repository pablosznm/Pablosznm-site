<!DOCTYPE html>
<html lang="en">
<head>

  <title>PABLOSZNM | Kanye Edition</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Floating album icons -->
  <div class="floating-icons">
    <img src="album1.png" style="left:10%; animation-duration:18s;">
    <img src="album2.png" style="left:30%; animation-duration:22s;">
    <img src="album3.png" style="left:50%; animation-duration:20s;">
    <img src="album4.png" style="left:70%; animation-duration:25s;">
    <img src="album5.png" style="left:85%; animation-duration:23s;">
  </div>
                    

  <header>
    <h1>PABLOSZNM</h1>
    <p>"Touch the Sky" – Kanye Fan Edition</p>
  </header>

  <div class="hub-grid">
    <a href="#" target="_blank" class="hub-card">
      <img src="assets/album1.png" alt="Album 1">
      <span>Album 1</span>
    </a>
    <a href="#" target="_blank" class="hub-card">
      <img src="assets/album2.png" alt="Album 2">
      <span>Album 2</span>
    </a>
    <a href="#" target="_blank" class="hub-card">
      <img src="assets/album3.png" alt="Album 3">
      <span>Album 3</span>
    </a>
    <a href="#" target="_blank" class="hub-card">
      <img src="assets/album4.png" alt="Album 4">
      <span>Album 4</span>
    </a>
    <a href="#" target="_blank" class="hub-card">
      <img src="assets/album5.png" alt="Album 5">
      <span>Album 5</span>
    </a>
  </div>
</body>
</html>
